# ==========================================
# GAME CONFIGURATION FILE
# ==========================================

# --- Display & Window Settings ---
screen:
  width: 1280
  height: 960
  scale: 0.8
  fps: 60                      # Target Frames Per Second
  caption: "Lab Platformer"    # Window title text

# --- Physics Engine Parameters ---
physics:
  gravity: 0.8                 # Downward acceleration applied to entities
  jump_force: -20              # Upward impulse (negative value moves up in Y-axis)
  player_speed: 7              # Horizontal movement speed
  collision_tolerance: 5       # Margin of error for collision detection (in pixels)

# --- Animation Timing ---
# Controls the playback speed multiplier for different states
animation_speeds:
  idle: 0.2
  run: 0.3
  jump: 0.3
  dance: 0.2
  speak: 0.2

# --- Player Initialization ---
player:
  start_x: 300                 # Initial X coordinate spawn point
  start_y: 300                 # Initial Y coordinate spawn point

# --- Platform Visuals & Logic ---
platform_style:
  padding: 2                   # Padding to prevent the border from being clipped
  border_color: [255, 255, 255, 10]  # Border color in RGBA (Red, Green, Blue, Alpha)
  border_width: 2              # Thickness of the visible border line
  mask_color: [255, 0, 0, 255] # Color used for collision mask generation (invisible to player)

# --- Lighting Effects (Spotlight/Fog of War) ---
lighting:
  radius: 90
  opacity: 255 

# --- Asset Management ---
assets:
  scale: [128, 128]            # Target dimensions [width, height] for asset resizing